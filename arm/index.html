<!DOCTYPE html>
<html>
<head>
    <title>Robot Animator Pro v4</title>
    <style>
        body { font-family: sans-serif; background: #1e1e2e; color: #cdd6f4; text-align: center; padding: 20px; margin: 0; }
        .card { background: #313244; padding: 25px; border-radius: 12px; display: inline-block; max-width: 600px; width: 100%; box-shadow: 0 8px 16px rgba(0,0,0,0.6); }
        h2, h3 { margin-top: 0; color: #89b4fa; }
        .slider-container { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; background: #45475a; padding: 10px; border-radius: 8px; }
        input[type=range] { flex-grow: 1; margin: 0 15px; cursor: pointer; }
        button { padding: 8px 12px; margin: 4px; cursor: pointer; border-radius: 6px; border: none; background: #89b4fa; color: #11111b; font-weight: bold; transition: 0.2s; }
        button:hover { background: #b4befe; }
        button:disabled { background: #585b70; color: #a6adc8; cursor: not-allowed; opacity: 0.7; }
        .danger { background: #f38ba8; } .danger:hover { background: #eba0ac; }
        .success { background: #a6e3a1; } .success:hover { background: #94e2d5; }
        .warning { background: #f9e2af; } .warning:hover { background: #f5e0dc; }
        .purple { background: #cba6f7; } .purple:hover { background: #b4befe; }
        textarea { width: 90%; height: 60px; margin-top: 10px; background: #11111b; color: #a6e3a1; border: 1px solid #585b70; padding: 10px; font-family: monospace; border-radius: 6px; resize: vertical; }
        select { padding: 8px; border-radius: 6px; background: #11111b; color: #cdd6f4; border: 1px solid #585b70; font-weight: bold; }
        .controls-row { display: flex; justify-content: center; gap: 10px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
        
        /* Modal Styles */
        #conflict-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #181825; border: 2px solid #f38ba8; padding: 30px; border-radius: 12px; text-align: left; max-width: 400px; }
        .modal-content p { font-size: 1.1em; }
        .modal-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="conflict-modal">
        <div class="modal-content">
            <h3 style="color:#f38ba8; margin-bottom:10px;">⚠️ Import Conflict</h3>
            <p id="conflict-text" style="font-weight:bold; color:#f9e2af;">Slot X has conflicting data.</p>
            <p><strong>🏠 Local Version:</strong> <span id="conf-local" style="color:#a6e3a1;">0</span> frames</p>
            <p><strong>☁️ Import Version:</strong> <span id="conf-imp" style="color:#89b4fa;">0</span> frames</p>
            
            <div class="modal-buttons">
                <button class="success" onclick="resolveConflict('local')">🏠 Keep Local (Ignore Import)</button>
                <button class="danger" onclick="resolveConflict('import')">⬇️ Overwrite (Use Import)</button>
                <button class="purple" onclick="resolveConflict('merge')">🔗 Merge (Append Import to Local)</button>
                <button onclick="cancelImport()" style="background:#585b70; color:white; margin-top:10px;">❌ Cancel Entire Import</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>🤖 Robot Animator Pro v4</h2>
        <button id="connect" class="success">🔌 Connect to Robot via USB</button>
        <p id="status" style="color: #f9e2af; font-weight: bold;">Status: Disconnected</p>
        
        <div id="sliders"></div>
        
        <hr style="border-color: #585b70; margin: 20px 0;">
        
        <h3>🎬 Animation & Playback</h3>
        <button class="success" onclick="saveFrame()">➕ Save Pose to Frame</button>
        <button class="danger" onclick="clearFrames()">🗑️ Clear Frames</button>
        <p>Active Frames: <span id="frameCount" style="font-weight:bold; color:#a6e3a1; font-size: 1.2em;">0</span></p>
        
        <div class="controls-row" style="background: #181825; padding: 15px; border-radius: 8px;">
            <button id="play-btn" class="success" onclick="togglePlay()">▶️ Play</button>
            <button class="danger" onclick="stopPlay()">⏹️ Stop</button>
            <label style="margin-left: 10px; cursor: pointer; font-weight: bold;">
                <input type="checkbox" id="loop-toggle"> 🔁 Loop Current
            </label>
        </div>

        <div class="controls-row" style="background: #181825; padding: 15px; border-radius: 8px; margin-top: 10px;">
            <div style="display: flex; flex-direction: column; align-items: center; width: 45%;">
                <label style="font-weight: bold; color: #89b4fa; margin-bottom: 5px;">Frame Speed: <span id="speed-val">600</span>ms</label>
                <input type="range" id="frame-speed" min="100" max="2000" step="50" value="600" oninput="document.getElementById('speed-val').innerText = this.value">
            </div>
            <div style="display: flex; flex-direction: column; align-items: center; width: 45%;">
                <label style="font-weight: bold; color: #cba6f7; margin-bottom: 5px;">Macro Pause: <span id="pause-val">1.0</span>s</label>
                <input type="range" id="macro-pause" min="0" max="5000" step="100" value="1000" oninput="document.getElementById('pause-val').innerText = (this.value/1000).toFixed(1)">
            </div>
        </div>
        
        <hr style="border-color: #585b70; margin: 20px 0;">

        <h3>💾 Library & Macros</h3>
        <div class="controls-row">
            <select id="slotSelect"></select>
            <button class="success" onclick="saveToSlot()">💾 Save to Slot</button>
            <button class="warning" onclick="loadFromSlot()">📂 Load Slot</button>
        </div>
        <div class="controls-row" style="margin-top:15px;">
            <button id="slideshow-btn" class="purple" onclick="toggleMacro(false)">🎞️ Slideshow All</button>
            <button id="shuffle-btn" class="purple" onclick="toggleMacro(true)">🔀 Shuffle All</button>
        </div>

        <hr style="border-color: #585b70; margin: 20px 0;">
        
        <h3>📦 Backup & Restore</h3>
        <button onclick="exportAll()">⬇️ Export All 15 Slots</button>
        <button onclick="startImport()" class="warning">⬆️ Import & Merge</button>
        <textarea id="io-box" placeholder="Exported code for ALL 15 slots will appear here. Paste code here to import."></textarea>
    </div>

    <script>
        let port, writer;
        const currentPos = [90, 90, 90, 90, 90, 90, 90];
        let currentFrames = [];
        let savedAnimations = JSON.parse(localStorage.getItem('robotAnims')) || Array(15).fill(null);

        // UI Setup
        const servoNames = ['Base (0)', 'Shoulders (1 & 2)', 'Hidden', 'Elbow (3)', 'Wrist Pitch (4)', 'Wrist Roll (5)', 'Gripper (6)'];
        const sliderDiv = document.getElementById('sliders');
        for(let i=0; i<7; i++) {
            if(i === 2) continue;
            sliderDiv.innerHTML += `
                <div class="slider-container">
                    <span style="width: 140px; text-align: left;">${servoNames[i]}</span>
                    <input type="range" id="s${i}" min="0" max="180" value="90" oninput="updateServo(${i}, this.value)">
                    <span id="v${i}" style="width:35px; text-align:right; font-weight:bold;">90°</span>
                </div>`;
        }

        updateSlotDropdown();

        // Connect USB
        document.getElementById('connect').onclick = async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                writer = port.writable.getWriter();
                document.getElementById('status').innerText = "Status: Connected!";
                document.getElementById('status').style.color = "#a6e3a1";
                document.getElementById('connect').style.display = "none";
            } catch (err) {
                alert("Connection failed! Check Nobara permissions.");
            }
        };

        async function updateServo(index, value) {
            currentPos[index] = parseInt(value);
            document.getElementById(`v${index}`).innerText = value + "°";
            if (writer) await writer.write(new TextEncoder().encode(`ALL:${currentPos.join(',')}\n`));
        }

        function saveFrame() {
            currentFrames.push([...currentPos]);
            document.getElementById('frameCount').innerText = currentFrames.length;
        }

        function clearFrames() {
            stopPlay();
            currentFrames = [];
            document.getElementById('frameCount').innerText = "0";
        }

        // --- PLAYBACK ENGINE ---
        let isPlaying = false;
        let isPaused = false;
        let playIndex = 0;
        let isMacroPlaying = false; 
        let activeLoopId = 0; // The zombie loop killer

        async function togglePlay() {
            if (currentFrames.length === 0) return alert("Add some frames first!");

            if (!isPlaying) {
                isPlaying = true;
                isPaused = false;
                activeLoopId++; // kill other loops
                document.getElementById('play-btn').innerText = "⏸️ Pause";
                playLoop(activeLoopId);
            } else if (!isPaused) {
                isPaused = true;
                document.getElementById('play-btn').innerText = "▶️ Resume";
            } else {
                isPaused = false;
                document.getElementById('play-btn').innerText = "⏸️ Pause";
            }
        }

        function stopPlay() {
            isPlaying = false;
            isPaused = false;
            isMacroPlaying = false; 
            activeLoopId++; // Kills any pending wait cycles instantly
            playIndex = 0;
            
            document.getElementById('play-btn').innerText = "▶️ Play";
            document.getElementById('status').innerText = port ? "Status: Connected!" : "Status: Disconnected";
            
            let ssBtn = document.getElementById('slideshow-btn');
            let shBtn = document.getElementById('shuffle-btn');
            if (ssBtn && shBtn) {
                ssBtn.innerText = "🎞️ Slideshow All";
                ssBtn.className = "purple";
                ssBtn.disabled = false;
                
                shBtn.innerText = "🔀 Shuffle All";
                shBtn.className = "purple";
                shBtn.disabled = false;
            }
        }

        async function playLoop(loopId) {
            while (isPlaying && loopId === activeLoopId) {
                if (isPaused) {
                    await new Promise(r => setTimeout(r, 100));
                    continue;
                }
                
                if (playIndex >= currentFrames.length) {
                    if (document.getElementById('loop-toggle').checked && !isMacroPlaying) {
                        playIndex = 0; 
                    } else {
                        break; 
                    }
                }

                if (playIndex < currentFrames.length) {
                    let frame = currentFrames[playIndex];
                    frame.forEach((val, i) => {
                        currentPos[i] = val;
                        if (i !== 2) {
                            document.getElementById(`s${i}`).value = val;
                            document.getElementById(`v${i}`).innerText = val + "°";
                        }
                    });
                    
                    if (writer) await writer.write(new TextEncoder().encode(`ALL:${frame.join(',')}\n`));
                    playIndex++;
                    
                    // Use custom delay from the slider
                    let speedMs = parseInt(document.getElementById('frame-speed').value);
                    await new Promise(r => setTimeout(r, speedMs)); 
                }
            }
            
            if(!isMacroPlaying && loopId === activeLoopId) stopPlay();
        }

        // --- SLIDESHOW & SHUFFLE MACROS ---
        async function toggleMacro(shuffle) {
            if(isMacroPlaying) {
                stopPlay();
                return;
            }
            
            let activeSlots = [];
            for(let i=0; i<15; i++) {
                if(savedAnimations[i] && savedAnimations[i].length > 0) activeSlots.push(i);
            }
            if(activeSlots.length === 0) return alert("Your library is empty! Save some slots first.");
            
            stopPlay(); // Clean slate
            activeLoopId++; 
            let macroLoopId = activeLoopId;
            isMacroPlaying = true;
            
            if (shuffle) {
                document.getElementById('shuffle-btn').innerText = "⏹️ Stop Shuffle";
                document.getElementById('shuffle-btn').className = "danger";
                document.getElementById('slideshow-btn').disabled = true;
            } else {
                document.getElementById('slideshow-btn').innerText = "⏹️ Stop Slideshow";
                document.getElementById('slideshow-btn').className = "danger";
                document.getElementById('shuffle-btn').disabled = true;
            }

            while (isMacroPlaying && macroLoopId === activeLoopId) {
                let playSequence = [...activeSlots];
                if(shuffle) playSequence.sort(() => Math.random() - 0.5);

                for(let slot of playSequence) {
                    if(!isMacroPlaying || macroLoopId !== activeLoopId) break; 

                    currentFrames = JSON.parse(JSON.stringify(savedAnimations[slot]));
                    document.getElementById('frameCount').innerText = currentFrames.length;
                    document.getElementById('status').innerText = `Status: Playing Slot ${slot + 1}...`;
                    
                    playIndex = 0;
                    isPlaying = true;
                    isPaused = false;
                    document.getElementById('play-btn').innerText = "⏸️ Pause";
                    
                    await playLoop(macroLoopId); 

                    if(!isMacroPlaying || macroLoopId !== activeLoopId) break; 

                    let pauseMs = parseInt(document.getElementById('macro-pause').value);
                    document.getElementById('status').innerText = `Status: ${(pauseMs/1000).toFixed(1)}s Delay...`;
                    await new Promise(r => setTimeout(r, pauseMs));
                }
            }
        }

        // --- LOCAL STORAGE MANAGER ---
        function updateSlotDropdown() {
            const select = document.getElementById('slotSelect');
            select.innerHTML = '';
            for(let i=0; i<15; i++) {
                let count = savedAnimations[i] ? savedAnimations[i].length : 0;
                let label = count > 0 ? `Slot ${i+1} (${count} frames)` : `Slot ${i+1} (Empty)`;
                select.innerHTML += `<option value="${i}">${label}</option>`;
            }
        }

        function saveToSlot() {
            if(currentFrames.length === 0) return alert("No active frames to save!");
            const slot = parseInt(document.getElementById('slotSelect').value);
            savedAnimations[slot] = JSON.parse(JSON.stringify(currentFrames));
            localStorage.setItem('robotAnims', JSON.stringify(savedAnimations));
            updateSlotDropdown();
            document.getElementById('slotSelect').value = slot;
            alert(`Saved ${currentFrames.length} frames to Slot ${slot+1}!`);
        }

        function loadFromSlot() {
            const slot = parseInt(document.getElementById('slotSelect').value);
            if(!savedAnimations[slot] || savedAnimations[slot].length === 0) return alert("That slot is empty!");
            
            stopPlay();
            currentFrames = JSON.parse(JSON.stringify(savedAnimations[slot]));
            document.getElementById('frameCount').innerText = currentFrames.length;
            
            currentFrames[0].forEach((val, i) => {
                if(i !== 2) { document.getElementById(`s${i}`).value = val; document.getElementById(`v${i}`).innerText = val + "°"; }
                currentPos[i] = val;
            });
            if(writer) writer.write(new TextEncoder().encode(`ALL:${currentFrames[0].join(',')}\n`));
            alert(`Loaded Slot ${slot+1}!`);
        }

        function exportAll() {
            document.getElementById('io-box').value = JSON.stringify(savedAnimations);
            alert("Exported! Copy the text in the box.");
        }

        // --- GIT-LIKE MERGE CONFLICT RESOLVER ---
        let importConflicts = [];
        let pendingImportData = [];
        let currentConflictIndex = 0;

        function startImport() {
            try {
                const data = JSON.parse(document.getElementById('io-box').value);
                if(!Array.isArray(data) || data.length !== 15) throw new Error("Format");
                
                importConflicts = [];
                pendingImportData = Array(15).fill(null);
                
                for(let i=0; i<15; i++) {
                    let local = savedAnimations[i];
                    let imp = data[i];
                    
                    if (imp && imp.length > 0) {
                        if (local && local.length > 0 && JSON.stringify(local) !== JSON.stringify(imp)) {
                            importConflicts.push({ slot: i, local: local, imp: imp });
                        } else {
                            pendingImportData[i] = imp;
                        }
                    } else {
                        pendingImportData[i] = local;
                    }
                }

                if (importConflicts.length > 0) {
                    currentConflictIndex = 0;
                    showConflictUI();
                } else {
                    finishImport();
                }
            } catch(e) {
                alert("Invalid code! Make sure you copied the entire array.");
            }
        }

        function showConflictUI() {
            let conf = importConflicts[currentConflictIndex];
            document.getElementById('conflict-text').innerText = `Conflict detected in Slot ${conf.slot + 1}:`;
            document.getElementById('conf-local').innerText = conf.local.length;
            document.getElementById('conf-imp').innerText = conf.imp.length;
            document.getElementById('conflict-modal').style.display = "flex";
        }

        function resolveConflict(decision) {
            let conf = importConflicts[currentConflictIndex];
            if (decision === 'local') pendingImportData[conf.slot] = conf.local;
            else if (decision === 'import') pendingImportData[conf.slot] = conf.imp;
            else if (decision === 'merge') pendingImportData[conf.slot] = conf.local.concat(conf.imp);

            currentConflictIndex++;
            if (currentConflictIndex < importConflicts.length) showConflictUI();
            else { document.getElementById('conflict-modal').style.display = "none"; finishImport(); }
        }

        function cancelImport() {
            document.getElementById('conflict-modal').style.display = "none";
            importConflicts = []; pendingImportData = [];
            alert("Import cancelled. Your local saves were not changed.");
        }

        function finishImport() {
            savedAnimations = pendingImportData;
            localStorage.setItem('robotAnims', JSON.stringify(savedAnimations));
            updateSlotDropdown();
            alert("Import and merging complete!");
        }
    </script>
</body>
</html>
